* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body { font-family:var(--font); background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased; overflow-x:hidden; }

   - Medication: Keytruda (non-preferred tier)
   - Action required: Peer review against formulary guidelines

3. NH-4892: Pathway Deviation (Orthopedic Surgery)
   - Status: Awaiting quality committee review
   - Deviation: Non-standard ACL reconstruction protocol
   - Impact: +$15,000 vs standard pathway

4. NH-5103: Compliance Gap (Discharge Documentation)
   - Status: CRITICAL — CMS violation
   - Issue: 72-hour readmission risk assessment missing
   - Action required: Immediate physician notification

5. NH-5934: Referral Triage (Neurology)
   - Status: Urgency assessment recommended
   - Recommendation: Escalate from Routine to High Priority
   - Scheduling: Multiple slots available within 1 week

6. Policy Update: CMS Telehealth Billing
   - Status: Implementation in progress
   - Impact: +$18,500 estimated revenue opportunity
   - Affected cases: 47 active telehealth encounters`;

  async function send(text) {
    setMessages(m => [...m, {role:'user', text}]);
    setInput('');
    setLoading(true);

    // Simulate AI response with delay
    setTimeout(() => {
      const responses = {
        'Chief Operations Officer': [
          {text: 'Currently, 8 cases have AI-flagged issues blocking progress: NH-5847 (imaging missing), NH-4892 (pathway review needed), NH-5103 (compliance), NH-4621 (formulary review), and 4 others. These represent critical path blockers. The compliance rate is 99.2% — one CMS gap in NH-5103 is our only active violation this month. Document type: Discharge summaries are causing the most delays (average 3.2 hours to complete). Estimated compliance cost: $85K if we don\'t resolve NH-5103 within 24 hours.', sources:['Case Pipeline','Compliance DB','Inbox']},
        ],
        'Clinical Operations Manager': [
          {text: 'Prior auth status: 3 cases waiting on documentation (NH-5847 imaging, NH-5934 scheduling, NH-4621 peer review). Pre-cert deadline risk: NH-5847 has 48 hours before insurance window closes. Top bottlenecks: (1) Imaging attachment delays (avg 12 hours), (2) Specialist signature collection (avg 8 hours), (3) Formulary policy interpretation (varies by insurance). Formulary exceptions pending: NH-4621 needs oncology peer review — estimated 4-6 hours. I recommend escalating imaging collection for NH-5847 immediately.', sources:['Inbox','Case Pipeline','Compliance DB']},
        ],
        'Compliance Officer': [
          {text: 'Documentation gaps identified: NH-5103 is critical (missing 72-hour readmission assessment). NH-5847 missing imaging but not yet a compliance issue. All other cases compliant. CMS review status: NH-5103 flagged in active audit. Timeline: Must be resolved within 24 hours. Audit findings summary: 1 critical gap, 0 major violations, 2 minor documentation inconsistencies (non-blocking). I recommend immediate physician notification for NH-5103 with 24-hour deadline.', sources:['Compliance DB','Inbox']},
        ],
        'Care Coordinator': [
          {text: 'Next steps by case: NH-5847 — contact Dr. Williams for imaging attachment (EKG & echo). NH-4621 — oncology peer review proceeding (Dr. Chen estimated 6 hours). NH-5934 — I recommend escalating to high priority based on migraine-with-aura protocol. Referral readiness: NH-5934 can be scheduled immediately; slots available Mon-Fri. Pathway recommendation (NH-4892): Dr. Chen\'s open surgical protocol is clinically justified but requires quality committee sign-off due to cost impact. Insurance coverage: All cases pre-verified except NH-4621 which needs tier exception confirmation.', sources:['Inbox','Clinical Standards','Case Pipeline']},
        ]
      };

      const roleResponses = responses[activeRole] || responses['Chief Operations Officer'];
      const response = roleResponses[Math.floor(Math.random() * roleResponses.length)];
      setMessages(m => [...m, {...response}]);
      setLoading(false);
    }, 800);
  }

  return (
    <div className="page" style={{padding:0,maxWidth:'100%',height:'100vh',display:'flex',flexDirection:'column'}}>
      <div style={{padding:'28px 40px 0',flex:'0 0 auto'}}>
        <div style={{fontSize:22,fontWeight:800,marginBottom:16}}>Ask the AI</div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 320px',gap:20,flex:1,padding:'0 40px 28px',minHeight:0}}>
        <div className="chat-container">
          <div className="chat-header">
            <div className="chat-header-title">Clinical Case Analysis</div>
            <div className="chat-role-tabs">
              {Object.keys(ROLE_QUESTIONS).map(role => (
                <button key={role} className={`chat-role-tab ${activeRole === role ? 'active' : ''}`} onClick={() => setActiveRole(role)}>
                  {role.split(' ')[0]}
                </button>
              ))}
            </div>
          </div>

          <div className="chat-messages">
            {messages.map((msg, i) => (
              <div key={i} className={`chat-message ${msg.role}`}>
                <div className="chat-avatar">{msg.role==='ai'?'🤖':'👤'}</div>
                <div>
                  <div className="chat-bubble">{msg.text}</div>
                  {msg.sources && (
                    <div className="chat-sources">
                      {msg.sources.map(s => <div key={s} className="source-chip">{s}</div>)}
                    </div>
                  )}
                </div>
              </div>
            ))}
            {loading && (
              <div className="chat-message ai">
                <div className="chat-avatar">🤖</div>
                <div className="chat-bubble" style={{opacity:0.6}}>Analyzing cases...</div>
              </div>
            )}
            <div ref={messagesEndRef} />
          </div>

          <div className="chat-input-area">
            <input
              type="text"
              className="chat-input"
              placeholder="Ask about a case, compliance, or workflow..."
              value={input}
              onChange={(e) => setInput(e.target.value)}
              onKeyPress={(e) => e.key === 'Enter' && input && send(input)}
              disabled={loading}
            />
            <button className="chat-send-btn" onClick={() => input && send(input)} disabled={loading}>
              {loading ? '⏳' : '→'}
            </button>
          </div>
        </div>

        <div style={{display:'flex',flexDirection:'column',gap:12,minHeight:0}}>
          <div style={{fontSize:13,fontWeight:700,color:'var(--text)'}}>Suggested for {activeRole.split(' ')[0]}</div>
          <div style={{flex:1,overflow:'y',display:'flex',flexDirection:'column',gap:8}}>
            {ROLE_QUESTIONS[activeRole].map((q, i) => (
              <button key={i} className="prompt-btn" onClick={() => send(q)}>
                {q}
              </button>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [tab, setTab] = useState('Overview');

  return (
    <div>
      <Header tab={tab} setTab={setTab} />
      {tab === 'Overview' && <Overview setTab={setTab} />}
      {tab === 'Inbox' && <Inbox />}
      {tab === 'AI Assistant' && <AskAI />}
      {tab === 'Pipeline' && <Pipeline />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
